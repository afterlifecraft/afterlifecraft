<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>After Life Craft</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0d0d0d;
    color: #ffffff;
    text-align: center;
}
.container {
    padding: 40px 20px;
}
h1 {
    font-size: 40px;
    margin-bottom: 10px;
}
.tagline {
    font-size: 18px;
    color: #aaaaaa;
    margin-bottom: 40px;
}
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    margin-bottom: 40px;
}
.gallery img {
    width: 100%;
    border-radius: 10px;
}
.contact {
    font-size: 16px;
    color: #cccccc;
}
.footer {
    margin-top: 50px;
    font-size: 14px;
    color: #777;
}
</style>
</head>
<body>

<div class="container">
    <h1>After Life Craft</h1>
    <div class="tagline">
        Cinematic Horror Atmosphere Assets for Unity Developers
    </div>

    <div class="gallery">
        <!-- Replace these with your images -->
        <img src="https://via.placeholder.com/400x250?text=Scene+1">
        <img src="https://via.placeholder.com/400x250?text=Scene+2">
        <img src="https://via.placeholder.com/400x250?text=Scene+3">
    </div>

    <div class="contact">
        Contact: rousonsuman@gmail.com
    </div>

    <div class="footer">
        © After Life Craft
    </div>
</div>

</body>
</html>
